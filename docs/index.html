<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>lynx SDK docs</title>
<meta name="description" content="Agent-grade docs for the lynx on-device CV SDK — Python, C, Swift, Kotlin, Java." />
<style>
  :root{
    --bg:#0A0A0A; --bg-2:#121110; --surface:#1A1916; --line:#2A2823; --line-2:#3A372F;
    --bone:#EDE6D2; --bone-2:#C8C1AE; --bone-dim:#7A7669; --red:#FF3B3B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--bone);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--bone-2);text-decoration:none}
  a:hover{color:var(--red)}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:16px;
    height:56px;padding:0 20px;background:rgba(10,10,10,.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  header .brand{font-weight:800;letter-spacing:-.02em;color:var(--red);font-size:20px}
  header .home{margin-left:auto;font-size:13px;color:var(--bone-dim)}
  .wrap{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 56px)}
  nav{width:264px;flex-shrink:0;border-right:1px solid var(--line);padding:22px 0 60px;
    position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
  nav .group{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--bone-dim);
    padding:0 22px;margin:18px 0 7px;font-weight:600}
  nav a{display:block;padding:5px 22px;font-size:13.5px;color:var(--bone-2);
    border-left:2px solid transparent}
  nav a:hover{color:var(--bone)}
  nav a.active{color:var(--bone);font-weight:600;border-left-color:var(--red);background:rgba(255,255,255,.05)}
  main{flex:1;min-width:0;padding:40px 48px 120px;max-width:820px}
  main h1,main h2,main h3{font-weight:600;letter-spacing:-.01em;line-height:1.25}
  main h1{font-size:30px;margin:.2em 0 .6em}
  main h2{font-size:22px;color:var(--red);margin:1.6em 0 .5em;padding-bottom:.3em;border-bottom:1px solid var(--line)}
  main h3{font-size:16px;margin:1.4em 0 .4em}
  main p,main li{color:var(--bone)}
  main code{background:var(--bg-2);border:1px solid var(--line);border-radius:4px;
    padding:.1em .35em;font-size:.86em;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--bone-2)}
  main pre{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:16px;overflow:auto}
  main pre code{background:none;border:0;padding:0;color:var(--bone-2)}
  main table{border-collapse:collapse;width:100%;margin:1em 0;font-size:14px;display:block;overflow-x:auto}
  main th,main td{border:1px solid var(--line);padding:7px 11px;text-align:left;vertical-align:top}
  main th{background:var(--surface);color:var(--bone);font-weight:600}
  main blockquote{border-left:3px solid var(--line-2);margin:1em 0;padding:.2em 1em;color:var(--bone-2)}
  main a{color:var(--red);border-bottom:1px solid rgba(255,59,59,.3)}
  .llm{padding:14px 22px;margin-top:8px}
  .llm a{display:inline-block;font-size:12px;border:1px solid var(--line-2);border-radius:5px;padding:4px 9px;color:var(--bone-2)}
  @media(max-width:820px){nav{display:none}main{padding:28px 20px 80px}}
</style>
</head>
<body>
<header>
  <span class="brand">lynx</span>
  <span style="font-size:13px;color:var(--bone-dim)">SDK documentation</span>
  <a class="home" href="https://golynx.ai/docs">golynx.ai&nbsp;↗</a>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="content">Loading…</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const NAV = [
  {group:"Getting started", items:[
    {label:"Overview", path:"index.md"},
    {label:"Install — Python", path:"install/python.md"},
    {label:"Install — C", path:"install/c.md"},
    {label:"Install — iOS / Swift", path:"install/ios.md"},
    {label:"Install — Android / Kotlin", path:"install/android.md"},
    {label:"Install — Java", path:"install/java.md"},
    {label:"System requirements", path:"support.md"},
  ]},
  {group:"API reference", items:[
    {label:"Python", path:"api/python.md"},
    {label:"C", path:"api/c.md"},
    {label:"Swift", path:"api/swift.md"},
    {label:"Kotlin", path:"api/kotlin.md"},
    {label:"Java", path:"api/java.md"},
    {label:"Conventions", path:"api/conventions.md"},
  ]},
  {group:"Recipes", items:[
    {label:"Detection — Python", path:"recipes/python-detection.md"},
    {label:"Detection — C", path:"recipes/c-detection.md"},
    {label:"Detection — iOS", path:"recipes/ios-detection.md"},
    {label:"Detection — Android", path:"recipes/android-detection.md"},
    {label:"Detection — Java", path:"recipes/java-detection.md"},
    {label:"Tracking — Python", path:"recipes/python-tracking.md"},
    {label:"Depth — Python", path:"recipes/python-depth.md"},
    {label:"Classification — Python", path:"recipes/python-classification.md"},
    {label:"OCR / text — Python", path:"recipes/python-ocr.md"},
    {label:"Live camera — Python", path:"recipes/python-streaming.md"},
    {label:"Server-side — Python", path:"recipes/python-server.md"},
  ]},
  {group:"Models", items:[
    {label:"Catalog", path:"models/catalog.md"},
    {label:"No model for my task?", path:"models/no-model.md"},
  ]},
];

const nav = document.getElementById("nav");
const content = document.getElementById("content");
const links = {};
for (const g of NAV) {
  const h = document.createElement("div"); h.className = "group"; h.textContent = g.group; nav.appendChild(h);
  for (const it of g.items) {
    const a = document.createElement("a"); a.textContent = it.label; a.href = "#" + it.path;
    links[it.path] = a; nav.appendChild(a);
  }
}
const llm = document.createElement("div"); llm.className = "llm";
llm.innerHTML = '<a href="../llms.txt">llms.txt — for AI agents ↗</a>';
nav.appendChild(llm);

function currentPath(){ const h = location.hash.replace(/^#/, ""); return links[h] ? h : "index.md"; }

async function render(){
  const path = currentPath();
  for (const p in links) links[p].classList.toggle("active", p === path);
  try {
    const res = await fetch("./" + path, {cache:"no-cache"});
    if (!res.ok) throw new Error(res.status);
    let md = await res.text();
    const html = marked.parse(md);
    content.innerHTML = html;
    // rewrite in-doc relative .md links to hash navigation
    content.querySelectorAll('a[href$=".md"]').forEach(a=>{
      const href = a.getAttribute("href");
      if (/^https?:/.test(href)) return;
      const norm = new URL(href, "x:/" + path).pathname.replace(/^\//, "");
      if (links[norm]) a.setAttribute("href", "#" + norm);
    });
    content.scrollTo(0,0); window.scrollTo(0,0);
  } catch(e){
    content.innerHTML = "<h1>Not found</h1><p>Couldn't load <code>"+path+"</code>.</p>";
  }
}
window.addEventListener("hashchange", render);
render();
</script>
</body>
</html>
